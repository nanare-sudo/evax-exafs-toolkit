# ============================================================
# Proben-Konfiguration: CoPt Nanopartikel
# ============================================================
# Ausfuehrung:
#   python run.py configs/CoPt_nanoparticles.yaml                     # Einzellauf
#   python run.py configs/CoPt_nanoparticles.yaml --parameter-scan    # Parameterstudie
#   python run.py configs/CoPt_nanoparticles.yaml --structure-compare # Strukturvergleich
# ============================================================

name: CoPt_nanoparticles
description: "CoPt Nanopartikel — Co K-Kante + Pt L3-Kante"

# --- Elemente und Kanten ---
# Co: 3d-Metall → K-Kante (7709 eV)
# Pt: 5d-Metall → L3-Kante (11564 eV), weil K-Kante bei ~78 keV zu hoch
edges: [Co, Pt]
edge_types: [K, L3]

# --- Experimentelle chi(k)-Dateien ---
chi_files:
  Co: data/chi_extracted/WB4_Co_avg_85_86_txt_chi.dat
  Pt: data/chi_extracted/WB4_Pt_scan88_txt_chi.dat

# --- Startstruktur (POSCAR-Format) ---
# FCC-Mischkristall, 128 Atome (64 Co + 64 Pt), a = 3.80 Angstrom
# Erzeugt mit: python scripts/generate_structures.py --preset CoPt
structure_file: structures/CoPt_fcc.p1
n_atoms: 128

# --- Strukturvergleich ---
# Relevante Strukturen fuer CoPt:
#   FCC  = ungeordneter Mischkristall
#   BCC  = kubisch-raumzentriert
#   HCP  = hexagonal dichteste Packung
#   L10  = geordnete tetragonale Phase (abwechselnde Co/Pt-Schichten)
structure_comparison:
  fcc:
    file: structures/CoPt_fcc.p1
    label: FCC
    lattice_constant: 3.80
    supercell: "4x4x4"
  bcc:
    file: structures/CoPt_bcc.p1
    label: BCC
    lattice_constant: 3.01
    supercell: "4x4x8"
  hcp:
    file: structures/CoPt_hcp.p1
    label: HCP
    lattice_constant: 2.68
    supercell: "8x4x4"
  l10:
    file: structures/CoPt_l10.p1
    label: L10
    lattice_constant: 3.80
    supercell: "4x4x8"

# ============================================================
# EvAX-Parameter (siehe PARAMETER_GUIDE.md)
# ============================================================

parameters:
  # Vergleichsraum: w = Wavelet (empfohlen)
  Space: w

  # k-Bereich (pro Kante: [Co, Pt])
  k_min: 3
  k_max: [11.5, 11.5]
  k_power: 2

  # Mehrfachstreuung
  N_legs: 4
  R_max_for_FEFF: [6, 6]

  # Optimierung
  Maximal_step_length: 0.005
  Maximal_displacement: 0.4
  Initial_displacement: 0.01

  # Konvergenz
  Stop_after: 100
  Froze_in: 150
  Number_of_states: 16

# ============================================================
# Parameter-Scan Einstellungen
# ============================================================
parameter_scan:
  screening_iterations: 50
  froze_in: 50
  max_parallel: 4
  phase1:
    k_min: [2, 3]
    k_power: [1, 2, 3]
    Space: [w, R, k]
    N_legs: [2, 4]
  phase2:
    Maximal_step_length: [0.001, 0.003, 0.005]
    Maximal_displacement: [0.2, 0.4]
    R_max_for_FEFF: [[4,4], [6,6]]

# ============================================================
# Strukturvergleich Einstellungen
# ============================================================
structure_compare:
  screening_iterations: 100
  froze_in: 150
  max_parallel: 4

# ============================================================
# Software-Pfade (relativ zum Projektverzeichnis)
# ============================================================
software:
  evax: software/EvAX-6.16_linux.exe
  feff: feff85exafs/legacy/mod/MONO/feff85L
